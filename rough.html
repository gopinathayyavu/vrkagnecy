<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRK AGENCY | Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <!-- Firebase CDN -->
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="js/firebase.js"></script>
    <script src="js/app.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
</head>

<body>
    <div class="app-layout">
        <aside class="sidebar">
            <div class="logo-area">
                <h2>VRK AGENCY</h2>
            </div>
            <nav class="nav-menu">
                <a onclick="goToPage('index.html')" class="nav-item active">Dashboard</a>
                <a onclick="goToPage('payments.html')" class="nav-item">Payments</a>
                <a onclick="goToPage('customers.html')" class="nav-item">Customers</a>
            </nav>
            <!-- <div class="sidebar-footer">
                <small>Realtime DB</small>
            </div> -->
        </aside>

        <main class="main-content">
            <header class="top-bar">
                <h1>Dashboard</h1>

                <div class="right-section">
                    <div onclick="refreshPage()" class="ref-badge">
                        <i class="fa fa-refresh refresh-icon"></i>
                    </div>
                    <div class="date-badge" id="liveDate"></div>
                </div>
            </header>

            <div class="cards-grid">
                <div class="stat-card">
                    <div class="card-icon"><i class="fa fa-inr" style="font-size:24px"></i></div>
                    <div class="card-info">
                        <h3>Total Amount</h3>
                        <p class="stat-number" id="totalAmount">₹0</p>
                    </div>
                </div>
                <div class="stat-card success">
                    <div class="card-icon"><i class="fa fa-check" style="font-size:24px"></i></div>
                    <div class="card-info">
                        <h3>Received Amount</h3>
                        <p class="stat-number" id="receivedAmount">₹0</p>
                    </div>
                </div>
                <div class="stat-card warning">
                    <div class="card-icon"><i class="fa fa-clock-o" style="font-size:24px"></i></div>
                    <div class="card-info">
                        <h3>Pending Amount</h3>
                        <p class="stat-number" id="pendingAmount">₹0</p>
                    </div>
                </div>
            </div>

            <div class="table-container">
                <div class="section-title">
                    <h2><i class='fas fa-bell' style='font-size:24px'></i> Highly Pending Customers</h2>
                    <span class="badge">sorted by pending</span>
                </div>
                <div class="responsive-table">
                    <table id="pendingCustomersTable">
                        <thead>
                            <tr>
                                <th>Customer Name</th>
                                <th>Mobile</th>
                                <th>Pending Amount</th>
                                <th>Last Payment Date</th>
                            </tr>
                        </thead>
                        <tbody id="pendingTableBody">
                            <tr>
                                <td colspan="4" class="loading-row">Loading...</td>
                            </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </main>
    </div>

    <script src="js/app.js"></script>
    <script>
        function goToPage(page) {
            window.location.href = page;
        }
    </script>
    <script>
        document.querySelector('.ref-badge').addEventListener('click', function () {
            location.reload();
        });
    </script>
    <script>
        function refreshPage() {
            const icon = document.querySelector(".refresh-icon");

            // Start spinning
            icon.classList.add("rotate");

            // Reload after short delay
            setTimeout(() => {
                location.reload();
            }, 500);
        }
    </script>
    <script>
        (function () {

            const db = window.firebaseDb;
            const customersRef = db.ref('customers');
            const paymentsRef = db.ref('payments');

            const totalEl = document.getElementById('totalAmount');
            const receivedEl = document.getElementById('receivedAmount');
            const pendingEl = document.getElementById('pendingAmount');
            const pendingTableBody = document.getElementById('pendingTableBody');

            function formatINR(x) {
                return '₹' + Number(x || 0).toLocaleString('en-IN');
            }

            function formatDate(ts) {
                return ts ? new Date(ts).toLocaleDateString() : '—';
            }

            /* 🔥 FILTER LOGIC */
            const filterType = 'all'; // you can later connect UI

            function filterByDate(date) {
                let d = new Date(date);
                let now = new Date();

                if (filterType === 'today') {
                    return d.toDateString() === now.toDateString();
                }

                if (filterType === 'month') {
                    return d.getMonth() === now.getMonth() &&
                        d.getFullYear() === now.getFullYear();
                }

                if (filterType === 'year') {
                    return d.getFullYear() === now.getFullYear();
                }

                return true;
            }

            function renderDashboard(customers, payments) {

                let total = 0;
                let received = 0;

                const perCustomer = {};

                for (let id in payments) {
                    let p = payments[id];
                    if (!p) continue;

                    if (!filterByDate(p.date)) continue;

                    let t = Number(p.totalAmount || 0);
                    let r = Number(p.receivedAmount || 0);

                    total += t;
                    received += r;

                    if (!perCustomer[p.customerId]) {
                        perCustomer[p.customerId] = {
                            total: 0,
                            received: 0,
                            lastDate: 0
                        };
                    }

                    perCustomer[p.customerId].total += t;
                    perCustomer[p.customerId].received += r;

                    if (p.date > perCustomer[p.customerId].lastDate) {
                        perCustomer[p.customerId].lastDate = p.date;
                    }
                }

                let pending = total - received;

                totalEl.innerText = formatINR(total);
                receivedEl.innerText = formatINR(received);
                pendingEl.innerText = formatINR(pending);

                /* 🔥 PENDING CUSTOMERS */
                let list = [];

                for (let cid in perCustomer) {
                    let c = customers[cid] || {};

                    let t = perCustomer[cid].total;
                    let r = perCustomer[cid].received;
                    let p = t - r;

                    if (p > 0) {
                        list.push({
                            name: c.name || "Unknown",
                            mobile: c.mobile || "—",
                            pending: p,
                            lastDate: perCustomer[cid].lastDate
                        });
                    }
                }

                list.sort((a, b) => b.pending - a.pending);

                if (list.length === 0) {
                    pendingTableBody.innerHTML =
                        '<tr><td colspan="4">✨ No pending dues</td></tr>';
                    return;
                }

                let html = '';

                list.forEach(item => {
                    html += `
            <tr>
                <td><strong>${item.name}</strong></td>
                <td>${item.mobile}</td>
                <td class="pending-amount">${formatINR(item.pending)}</td>
                <td>${formatDate(item.lastDate)}</td>
            </tr>`;
                });

                pendingTableBody.innerHTML = html;
            }

            let customersData = {};
            let paymentsData = {};

            customersRef.on('value', snap => {
                customersData = snap.val() || {};
                renderDashboard(customersData, paymentsData);
            });

            paymentsRef.on('value', snap => {
                paymentsData = snap.val() || {};
                renderDashboard(customersData, paymentsData);
            });

        })();
    </script>
</body>

</html>
