<!DOCTYPE html>
<html>

<head>
    <title>VRK AGENCY | Dashboard</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="js/firebase.js"></script>
</head>

<body>

    <div class="app-layout">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-area">
                <h2>VRK AGENCY</h2>
            </div>

            <nav class="nav-menu">
                <a onclick="goToPage('index.html')" class="nav-item active">Dashboard</a>
                <a onclick="goToPage('payments.html')" class="nav-item">Payments</a>
                <a onclick="goToPage('customers.html')" class="nav-item">Customers</a>
            </nav>
        </aside>

        <!-- Main -->
        <main class="main-content">

            <header class="top-bar">
                <h1>Dashboard</h1>

                <div class="right-section">
                    <div onclick="refreshPage()" class="ref-badge">
                        <i class="fa fa-refresh refresh-icon"></i>
                    </div>
                    <div class="date-badge" id="todayDate"></div>
                </div>
            </header>

            <!-- 🔥 FILTERS -->
            <div class="filters-bar">
                <select id="filterType" class="filter-select">
                    <option value="all">All</option>
                    <option value="today">Today</option>
                    <option value="month">This Month</option>
                    <option value="year">This Year</option>
                </select>

                <input type="date" id="fromDate" class="filter-input">
                <input type="date" id="toDate" class="filter-input">
            </div>

            <!-- Cards -->
            <div class="cards-grid">
                <div class="stat-card">
                    <div class="card-icon">₹</div>
                    <div class="card-info">
                        <h3>Total</h3>
                        <div class="stat-number" id="totalAmount">₹0</div>
                    </div>
                </div>

                <div class="stat-card success">
                    <div class="card-icon">✔</div>
                    <div class="card-info">
                        <h3>Received</h3>
                        <div class="stat-number" id="receivedAmount">₹0</div>
                    </div>
                </div>

                <div class="stat-card warning">
                    <div class="card-icon">⚠</div>
                    <div class="card-info">
                        <h3>Pending</h3>
                        <div class="stat-number" id="pendingAmount">₹0</div>
                    </div>
                </div>
            </div>

            <!-- Pending Customers -->
            <div class="table-container">

                <div class="section-title">
                    <h2>Highly Pending Customers</h2>
                </div>

                <div class="responsive-table">
                    <table>
                        <thead>
                            <tr>
                                <th>Name</th>
                                <th>Mobile</th>
                                <th>Pending</th>
                                <th>Last Payment</th>
                            </tr>
                        </thead>

                        <tbody id="pendingTableBody">
                            <tr>
                                <td colspan="4">Loading...</td>
                            </tr>
                        </tbody>

                    </table>
                </div>

            </div>

        </main>
    </div>
    <script>
        document.querySelector('.ref-badge').addEventListener('click', function () {
            location.reload();
        });
    </script>
    <script>
        function refreshPage() {
            const icon = document.querySelector(".refresh-icon");

            // Start spinning
            icon.classList.add("rotate");

            // Reload after short delay
            setTimeout(() => {
                location.reload();
            }, 500);
        }
    </script>
    <script>

        const db = window.firebaseDb;
        const customersRef = db.ref('customers');
        const paymentsRef = db.ref('payments');

        const totalEl = document.getElementById('totalAmount');
        const receivedEl = document.getElementById('receivedAmount');
        const pendingEl = document.getElementById('pendingAmount');
        const pendingTableBody = document.getElementById('pendingTableBody');

        const filterTypeEl = document.getElementById("filterType");
        const fromDateEl = document.getElementById("fromDate");
        const toDateEl = document.getElementById("toDate");

        let customersData = {};
        let paymentsData = {};

        function formatINR(x) {
            return '₹' + Number(x || 0).toLocaleString('en-IN');
        }

        /* Date badge */
        document.getElementById("todayDate").innerText =
            new Date().toDateString();

        /* 🔥 FILTER */
        function filterByDate(date) {
            let d = new Date(date);
            let now = new Date();

            let type = filterTypeEl.value;

            if (type === "today") {
                return d.toDateString() === now.toDateString();
            }

            if (type === "month") {
                return d.getMonth() === now.getMonth() &&
                    d.getFullYear() === now.getFullYear();
            }

            if (type === "year") {
                return d.getFullYear() === now.getFullYear();
            }

            if (fromDateEl.value && toDateEl.value) {
                let from = new Date(fromDateEl.value);
                let to = new Date(toDateEl.value);
                return d >= from && d <= to;
            }

            return true;
        }

        /* 🔥 FILTERED PAYMENTS */
        function getFilteredPayments(payments) {
            let result = {};

            for (let id in payments) {
                let p = payments[id];
                if (!p) continue;

                if (filterByDate(p.date)) {
                    result[id] = p;
                }
            }

            return result;
        }

        /* 🔥 MAIN RENDER */
        function renderDashboard(customers, payments) {

            let total = 0;
            let received = 0;

            const perCustomer = {};

            for (let id in payments) {
                let p = payments[id];
                if (!p) continue;

                let t = Number(p.totalAmount || 0);
                let r = Number(p.receivedAmount || 0);

                total += t;
                received += r;

                if (!perCustomer[p.customerId]) {
                    perCustomer[p.customerId] = {
                        total: 0,
                        received: 0,
                        lastDate: 0
                    };
                }

                perCustomer[p.customerId].total += t;
                perCustomer[p.customerId].received += r;

                if (p.date > perCustomer[p.customerId].lastDate) {
                    perCustomer[p.customerId].lastDate = p.date;
                }
            }

            let pending = total - received;

            totalEl.innerText = formatINR(total);
            receivedEl.innerText = formatINR(received);
            pendingEl.innerText = formatINR(pending);

            let list = [];

            for (let cid in perCustomer) {
                let c = customers[cid] || {};

                let t = perCustomer[cid].total;
                let r = perCustomer[cid].received;
                let p = t - r;

                if (p > 0) {
                    list.push({
                        name: c.name || "Unknown",
                        mobile: c.mobile || "—",
                        pending: p,
                        lastDate: perCustomer[cid].lastDate
                    });
                }
            }

            list.sort((a, b) => b.pending - a.pending);

            let html = '';

            if (list.length === 0) {
                html = `<tr><td colspan="4">✨ No pending dues</td></tr>`;
            } else {
                list.forEach(item => {
                    html += `
            <tr>
                <td><strong>${item.name}</strong></td>
                <td>${item.mobile}</td>
                <td class="pending-amount">${formatINR(item.pending)}</td>
                <td>${new Date(item.lastDate).toLocaleDateString()}</td>
            </tr>`;
                });
            }

            pendingTableBody.innerHTML = html;
        }

        /* 🔁 REFRESH */
        function refreshDashboard() {
            renderDashboard(
                customersData,
                getFilteredPayments(paymentsData)
            );
        }

        /* EVENTS */
        filterTypeEl.onchange = refreshDashboard;
        fromDateEl.onchange = refreshDashboard;
        toDateEl.onchange = refreshDashboard;

        /* FIREBASE */
        customersRef.on('value', snap => {
            customersData = snap.val() || {};
            refreshDashboard();
        });

        paymentsRef.on('value', snap => {
            paymentsData = snap.val() || {};
            refreshDashboard();
        });

        /* NAV */
        function goToPage(p) {
            window.location.href = p;
        }

    </script>

</body>

</html>
