<!DOCTYPE html>
<html>
<head>
  <title>VRK AGENCY | Add Product</title>
  <link rel="stylesheet" href="css/style.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="js/firebase.js"></script>

  <style>
    .card {
      background: white;
      padding: 30px;
      border-radius: 16px;
      width: 400px;
      margin: 40px auto;
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    .toast {
      position: fixed;
      top: 20px;
      right: 20px;
      background: #28a745;
      color: white;
      padding: 12px 18px;
      border-radius: 8px;
      opacity: 0;
      transition: 0.3s;
    }

    .toast.show {
      opacity: 1;
    }
  </style>
</head>

<body>

<div class="app-layout">

  <aside class="sidebar">
    <div class="logo-area"><h2>VRK AGENCY</h2></div>
    <nav class="nav-menu">
      <a onclick="goToPage('index.html')" class="nav-item">Dashboard</a>
      <a onclick="goToPage('payments.html')" class="nav-item">Payments</a>
      <a onclick="goToPage('customers.html')" class="nav-item">Customers</a>
      <a onclick="goToPage('products.html')" class="nav-item  active">Products</a>
    </nav>
  </aside>

  <main class="main-content">

    <header class="top-bar">
      <h1>Add Product</h1>
    </header>

    <div class="card">

      <form id="productForm">

        <div class="form-group">
          <label>Product Name *</label>
          <input  autocomplete="off" type="text" id="name" required>
        </div>

        <div class="form-group">
          <label>Price *</label>
          <input type="number" id="price" required>
        </div>

        <div class="form-group">
          <label>Quantity *</label>
          <input type="number" id="quantity"  autocomplete="off" required>
        </div>

        <div class="form-group">
          <label>Unit (kg / bag / piece)</label>
          <input type="text" id="unit"  autocomplete="off" required>
        </div>

        <button class="btn-primary">Save Product</button>

      </form>

    </div>

  </main>
</div>

<div id="toast" class="toast"></div>

<script>
function goToPage(p){ window.location.href = p; }

const db = window.firebaseDb;
const productsRef = db.ref('products');

function showToast(msg){
  const t = document.getElementById("toast");
  t.innerText = msg;
  t.classList.add("show");

  setTimeout(()=>{
    t.classList.remove("show");
    window.location.href = "products.html";
  },1500);
}

document.getElementById("productForm").addEventListener("submit", function(e){
  e.preventDefault();

  const name = document.getElementById("name").value.trim();
  const price = Number(document.getElementById("price").value);
  const unit = document.getElementById("unit").value.trim();
  const quantity = Number(document.getElementById("quantity").value);

  if(!name || !price || !unit || !quantity){
    showToast("Fill all fields ❌");
    return;
  }

  productsRef.push({
    name,
    price,
    unit,
    quantity,
    createdAt: Date.now()
  }).then(()=>{
    showToast("Product Added ✅");
  });

});
</script>

</body>
</html>
