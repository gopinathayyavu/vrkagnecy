<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>VRK AGENCY | Add Payment</title>
    <link rel="stylesheet" href="css/style.css">

    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
    <script src="js/firebase.js"></script>

    <style>
        /* Center layout */
        .form-wrapper {
            display: flex;
            justify-content: center;
            margin-top: 40px;
        }

        /* Card */
        .form-card {
            background: #ffffff;
            padding: 25px;
            width: 420px;
            border-radius: 16px;
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.1);
        }

        .form-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        /* Form */
        .form-group {
            margin-bottom: 18px;
        }

        .form-group label {
            display: block;
            margin-bottom: 6px;
            font-weight: 600;
        }

        .form-group input {
            width: 100%;
            padding: 12px;
            border-radius: 25px;
            border: 1px solid #ccc;
            outline: none;
        }

        /* Search dropdown */
        .search-results {
            margin-top: 5px;
            border-radius: 10px;
            background: #fff;
            border: 1px solid #ddd;
            max-height: 150px;
            overflow-y: auto;
        }

        .search-item {
            padding: 10px;
            cursor: pointer;
            border-bottom: 1px solid #eee;
        }

        .search-item:hover {
            background: #f3f3f3;
        }

        /* Radio */
        .radio-group {
            display: flex;
            gap: 20px;
        }

        .radio-group label {
            cursor: pointer;
        }

        /* Make form fit one screen */
        .modal-content {
            max-height: 90vh;
            overflow-y: auto;
            padding: 15px !important;
        }

        /* Reduce spacing */
        .form-group {
            margin-bottom: 10px !important;
        }

        /* Reduce input size */
        .form-group input,
        .form-group select {
            padding: 8px 10px !important;
            font-size: 14px;
        }

        /* Reduce heading spacing */
        .modal-content h3 {
            margin-bottom: 10px;
        }

        /* Button spacing */
        .btn-primary {
            padding: 10px 18px;
        }

        /* Make modal centered properly */
        .modal {
            align-items: center;
            justify-content: center;
        }
    </style>
</head>

<body>

    <div class="app-layout">

        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="logo-area">
                <h2>VRK AGENCY</h2>
            </div>
            <nav class="nav-menu">
                <a onclick="goToPage('index.html')" class="nav-item">Dashboard</a>
                <a onclick="goToPage('payments.html')" class="nav-item active">Payments</a>
                <a onclick="goToPage('customers.html')" class="nav-item">Customers</a>
            </nav>
        </aside>

        <!-- Main -->
        <main class="main-content">

            <header class="top-bar">
                <h1>Add Payment</h1>
                <button class="btn-primary" onclick="goToPage('payments.html')">← Back</button>
            </header>

            <div class="form-wrapper">
                <div class="form-card">

                    <div class="form-header">
                        <h2>Add New Payment</h2>
                    </div>

                    <form id="paymentForm">

                        <!-- Customer -->
                        <div class="form-group">
                            <label>Customer *</label>
                            <input type="text" id="searchCustomer" placeholder="Search name or mobile">
                            <div id="results" class="search-results"></div>
                        </div>

                        <!-- Date -->
                        <div class="form-group">
                            <label>Date *</label>
                            <input type="date" id="date" required>
                        </div>

                        <!-- Total -->
                        <div class="form-group">
                            <label>Total Amount (₹) *</label>
                            <input type="number" id="total" required>
                        </div>

                        <!-- Radio -->
                        <div class="form-group">
                            <label>Payment Type *</label>

                            <div class="radio-group">
                                <label>
                                    <input type="radio" name="type" value="paid" checked> Paid
                                </label>

                                <label>
                                    <input type="radio" name="type" value="pending"> Pending
                                </label>
                            </div>
                        </div>

                        <!-- Received -->
                        <div class="form-group" id="receivedGroup" style="display:none;">
                            <label>Received Amount (₹)</label>
                            <input type="number" id="received">
                        </div>

                        <button type="submit" class="btn-primary">Save Payment</button>

                    </form>

                </div>
            </div>

        </main>
    </div>

    <script>
        function goToPage(p) { window.location.href = p; }

        const db = window.firebaseDb;
        const customersRef = db.ref('customers');
        const paymentsRef = db.ref('payments');

        let customers = [];
        let selectedCustomer = null;

        // Load customers
        customersRef.once('value', snap => {
            customers = Object.entries(snap.val() || {}).map(([id, d]) => ({ id, ...d }));
        });

        // Search customer
        document.getElementById('searchCustomer').oninput = function () {
            let val = this.value.toLowerCase();
            let html = "";

            customers
                .filter(c => c.name.toLowerCase().includes(val) || c.mobile.includes(val))
                .forEach(c => {
                    html += `
        <div class="search-item" onclick="selectCustomer('${c.id}')">
          <strong>${c.name}</strong><br>
          <small>${c.mobile}</small>
        </div>`;
                });

            document.getElementById('results').innerHTML = html;
        };

        // Select customer
        function selectCustomer(id) {
            selectedCustomer = customers.find(c => c.id === id);

            document.getElementById('searchCustomer').value = selectedCustomer.name;
            document.getElementById('results').innerHTML = "";
        }

        // Radio change
        document.querySelectorAll('input[name="type"]').forEach(radio => {
            radio.addEventListener('change', function () {
                document.getElementById('receivedGroup').style.display =
                    this.value === 'pending' ? 'block' : 'none';
            });
        });

        // Save
        document.getElementById('paymentForm').addEventListener('submit', function (e) {
            e.preventDefault();

            if (!selectedCustomer) return alert("Select customer");

            let total = Number(document.getElementById('total').value);
            let type = document.querySelector('input[name="type"]:checked').value;

            let received = type === 'paid'
                ? total
                : Number(document.getElementById('received').value);

            let data = {
                customerId: selectedCustomer.id,
                totalAmount: total,
                receivedAmount: received,
                pendingAmount: total - received,
                date: new Date(document.getElementById('date').value).getTime()
            };

            paymentsRef.push(data).then(() => {
                alert("Payment Saved");
                window.location.href = "payments.html";
            });
        });
    </script>

</body>

</html>
