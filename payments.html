<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>VRK AGENCY | Payments</title>
  <link rel="stylesheet" href="css/style.css">

  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-database-compat.js"></script>
  <script src="js/firebase.js"></script>

  <style>
    /* ✅ FILTERS ALWAYS IN ONE ROW */
    .filters-bar {
      display: flex;
      gap: 10px;
      flex-wrap: nowrap;
      overflow-x: auto;
    }

    .filters-bar input,
    .filters-bar select {
      min-width: 150px;
      flex: 1;
    }

    /* Optional smooth scroll */
    .filters-bar::-webkit-scrollbar {
      height: 5px;
    }
  </style>
</head>

<body>
  <div class="app-layout">

    <!-- Sidebar -->
    <aside class="sidebar">
      <div class="logo-area">
        <h2>VRK AGENCY</h2>
      </div>
      <nav class="nav-menu">
        <a onclick="goToPage('index.html')" class="nav-item">Dashboard</a>
        <a class="nav-item active">Payments</a>
        <a onclick="goToPage('customers.html')" class="nav-item">Customers</a>
      </nav>
    </aside>

    <!-- Main -->
    <main class="main-content">

      <header class="top-bar">
        <h1>Payments</h1>
        <button class="btn-primary" onclick="goToPage('add-payment.html')">+ Add Payment</button>
      </header>

      <!-- Filters -->
      <div class="filters-bar">
        <input type="text" id="searchInput" placeholder="Search name / mobile" class="filter-input">

        <select id="quickFilter" class="filter-select">
          <option value="all">All</option>
          <option value="today">Today</option>
          <option value="month">This Month</option>
          <option value="year">This Year</option>
        </select>

        <input type="date" id="fromDate" class="filter-input">
        <input type="date" id="toDate" class="filter-input">
      </div>

      <!-- Table -->
      <div class="table-container">
        <div class="responsive-table">
          <table>
            <thead>
              <tr>
                <th>Name</th>
                <th>Mobile</th>
                <th>Total</th>
                <th>Received</th>
                <th>Pending</th>
                <th>Action</th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
      </div>

    </main>
  </div>

  <script>
    function goToPage(p) { window.location.href = p; }

    (function () {
      const db = window.firebaseDb;
      const paymentsRef = db.ref('payments');
      const customersRef = db.ref('customers');

      let payments = [];
      let customers = [];

      const tableBody = document.getElementById('tableBody');
      const searchInput = document.getElementById('searchInput');
      const quickFilter = document.getElementById('quickFilter');
      const fromDate = document.getElementById('fromDate');
      const toDate = document.getElementById('toDate');

      function formatINR(x) { return "₹" + Number(x || 0).toLocaleString('en-IN'); }

      function filterByDate(date) {
        let d = new Date(date);
        let now = new Date();

        if (quickFilter.value === 'today') {
          return d.toDateString() === now.toDateString();
        }

        if (quickFilter.value === 'month') {
          return d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear();
        }

        if (quickFilter.value === 'year') {
          return d.getFullYear() === now.getFullYear();
        }

        if (fromDate.value && toDate.value) {
          let from = new Date(fromDate.value);
          let to = new Date(toDate.value);
          return d >= from && d <= to;
        }

        return true;
      }

      function render() {
        let map = {};

        payments.forEach(p => {
          if (!filterByDate(p.date)) return;

          if (!map[p.customerId]) {
            let cust = customers.find(c => c.id === p.customerId) || {};
            map[p.customerId] = {
              name: cust.name || "Unknown",
              mobile: cust.mobile || "",
              total: 0,
              received: 0
            };
          }

          map[p.customerId].total += p.totalAmount;
          map[p.customerId].received += p.receivedAmount;
        });

        let search = searchInput.value.toLowerCase();

        let html = "";

        Object.entries(map).forEach(([id, data]) => {
          if (search && !(data.name.toLowerCase().includes(search) || data.mobile.includes(search))) return;

          let pending = data.total - data.received;

          html += `
      <tr>
        <td>${data.name}</td>
        <td>${data.mobile}</td>
        <td>${formatINR(data.total)}</td>
        <td>${formatINR(data.received)}</td>
        <td>${formatINR(pending)}</td>
        <td><button class="btn-small" onclick="viewHistory('${id}')">History</button></td>
      </tr>`;
        });

        tableBody.innerHTML = html || `<tr><td colspan="6">No data</td></tr>`;
      }

      window.viewHistory = function (id) {
        window.location.href = "history.html?customerId=" + id;
      }

      /* ✅ SORT LATEST FIRST */
      paymentsRef.on('value', snap => {
        let obj = snap.val() || {};

        payments = Object.entries(obj)
          .map(([id, d]) => ({ id, ...d }))
          .sort((a, b) => b.date - a.date); // 🔥 latest first

        render();
      });

      customersRef.on('value', snap => {
        let obj = snap.val() || {};
        customers = Object.entries(obj).map(([id, d]) => ({ id, ...d }));
        render();
      });

      searchInput.oninput = render;
      quickFilter.onchange = render;
      fromDate.onchange = render;
      toDate.onchange = render;

    })();
  </script>

</body>

</html>
